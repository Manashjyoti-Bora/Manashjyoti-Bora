<text x="590" y="84" text-anchor="middle" font-family="monospace" font-size="13" fill="#94A3B8" opacity="0">— every wave here is hand-coded SVG too —<animate attributeName="opacity" values="0;1" dur="1s" begin="1s" fill="freeze"/></text>
