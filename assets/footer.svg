<defs>
<linearGradient id="fg1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#22D3EE"/></linearGradient>
<linearGradient id="fg2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0369a1"/><stop offset="100%" stop-color="#10B981"/></linearGradient>
<clipPath id="fc"><rect width="1180" height="170" rx="16"/></clipPath>
</defs>
<g clip-path="url(#fc)">
<rect width="1180" height="170" fill="#030712"/>
<path d="M 0 96 Q 148 66 295 96 T 590 96 T 885 96 T 1180 96 T 1475 96 T 1770 96 L 1770 170 L 0 170 Z" fill="url(#fg1)" opacity="0.35">
<animateTransform attributeName="transform" type="translate" values="0,0;-590,0" dur="9s" repeatCount="indefinite"/></path>
<path d="M 0 116 Q 148 88 295 116 T 590 116 T 885 116 T 1180 116 T 1475 116 T 1770 116 L 1770 170 L 0 170 Z" fill="url(#fg2)" opacity="0.55">
